# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
version: 2

project_name: productize

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

env:
  - CGO_ENABLED=0

before:
  hooks:
    - make go-build

git:
  tag_sort: -version:refname

builds:
  - id: productize
    main: ./cmd/productize
    binary: productize
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/itseffi/productize/internal/version.Version={{ .Version }}
      - -X github.com/itseffi/productize/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/itseffi/productize/internal/version.Date={{ .Date }}
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: productize-archive
    ids:
      - productize
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*
    # Keep the binary at the archive root so Homebrew formulas can install it directly.

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "0.0.0-{{ .Timestamp }}"

source:
  enabled: true

changelog:
  # Use git history so the first release works before a previous tag exists on GitHub.
  use: git
  sort: asc
  abbrev: 7
  groups:
    - title: "🎉 Features"
      regexp: "^.*feat[\\(\\w)]*:+.*$"
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: "^.*fix[\\(\\w)]*:+.*$"
      order: 1
    - title: "⚡ Performance Improvements"
      regexp: "^.*perf[\\(\\w)]*:+.*$"
      order: 2
    - title: "🔒 Security"
      regexp: "^.*security[\\(\\w)]*:+.*$"
      order: 3
    - title: "📚 Documentation"
      regexp: "^.*docs[\\(\\w)]*:+.*$"
      order: 4
    - title: "♻️ Refactoring"
      regexp: "^.*refactor[\\(\\w)]*:+.*$"
      order: 5
    - title: "📦 Dependencies"
      regexp: "^.*deps[\\(\\w)]*:+.*$"
      order: 6
    - title: "🧪 Testing"
      regexp: "^.*test[\\(\\w)]*:+.*$"
      order: 7
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^(build|ci): "
      - "^ci\\(release\\): "
      - "^release: "
      - "^chore\\(release\\): "
      - "^chore: auto-update generated files$"
      - "^chore: docs$"
      - "^chore: schema update$"
      - "^chore: typo$"
      - "^chore\\(legal\\): "
      - "^chore\\(deps\\): "
      - "^docs: update$"
      - "^test:"
      - "^test\\("
      - "merge conflict"
      - Merge branch
      - Merge pull request
      - Merge remote-tracking branch
      - go mod tidy
      - "^wip "
      - "^wip:"

release:
  github:
    owner: itseffi
    name: productize
  name_template: "Release {{ .Version }}"
  mode: replace
  draft: false
  prerelease: auto

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

# Homebrew cask configuration
homebrew_casks:
  - name: productize
    ids:
      - productize-archive
    binaries:
      - productize
    repository:
      owner: itseffi
      name: homebrew-productize
      branch: main
      token: "{{ .Env.RELEASE_TOKEN }}"

    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com

    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Casks
    homepage: "https://github.com/itseffi/productize"
    description: "Productize CLI"
    license: "MIT"
    skip_upload: auto
