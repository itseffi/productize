name: Productize Skill Docs Freshness

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Verify repository hygiene
        run: npm run repo:hygiene
      - name: Regenerate canonical skills, host outputs, registries, and plugins
        run: npm run build
      - name: Verify generated outputs are fresh
        run: |
          set -euo pipefail
          paths="SKILL.md skills agents .agents .claude .cursor .opencode .factory registry plugins"
          git diff --exit-code -- $paths || {
            echo "Generated Productize outputs are stale. Run: npm run build"
            exit 1
          }
          untracked="$(git ls-files --others --exclude-standard -- $paths)"
          if [ -n "$untracked" ]; then
            echo "Generated Productize outputs created untracked files:"
            echo "$untracked"
            echo "Run: npm run build"
            exit 1
          fi
