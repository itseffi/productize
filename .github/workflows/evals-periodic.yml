name: Productize Periodic Evals

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: productize-evals-periodic
  cancel-in-progress: true

jobs:
  full-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run build
      - run: npm run eval:periodic -- --report-dir .productize-evals/periodic
      - run: npm run eval:llm:offline -- --report-dir .productize-evals/llm-offline
      - name: Write eval summary
        if: always()
        run: node scripts/report-eval-results.mjs .productize-evals | tee "$GITHUB_STEP_SUMMARY"
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: productize-periodic-evals
          path: .productize-evals/
          if-no-files-found: error
          retention-days: 30
