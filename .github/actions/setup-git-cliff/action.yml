name: "Setup git-cliff"
description: "Sets up the git-cliff changelog generator"
author: "Productize Team"

inputs:
  version:
    description: "git-cliff version to install"
    required: false
    default: "2.7.0" # Pin to stable version for better caching

outputs:
  version:
    description: "The git-cliff version that was installed"
    value: ${{ steps.install-cliff.outputs.version }}
  cache-hit:
    description: "Whether the git-cliff cache was hit"
    value: ${{ steps.cache-cliff.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Cache git-cliff binary
      id: cache-cliff
      uses: actions/cache@v5
      with:
        path: ~/.local/bin/git-cliff
        key: ${{ runner.os }}-${{ runner.arch }}-git-cliff-${{ inputs.version }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-git-cliff-

    - name: Install git-cliff
      id: install-cliff
      shell: bash
      run: |
        set -e
        mkdir -p "$HOME/.local/bin"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

        if [ ! -x "$HOME/.local/bin/git-cliff" ]; then
          VERSION="${{ inputs.version }}"
          if [ "$VERSION" = "latest" ]; then
            echo "::error::latest git-cliff installs are intentionally unsupported; pin a version"
            exit 1
          fi

          VERSION_NO_V="${VERSION#v}"
          TAG="v$VERSION_NO_V"
          OS="$(uname -s)"
          ARCH="$(uname -m)"
          case "$OS/$ARCH" in
            Linux/x86_64) TARGET="x86_64-unknown-linux-gnu" ;;
            Linux/aarch64|Linux/arm64) TARGET="aarch64-unknown-linux-gnu" ;;
            Darwin/x86_64) TARGET="x86_64-apple-darwin" ;;
            Darwin/arm64) TARGET="aarch64-apple-darwin" ;;
            *)
              echo "::error::Unsupported git-cliff platform: $OS/$ARCH"
              exit 1
              ;;
          esac

          URL="https://github.com/orhun/git-cliff/releases/download/$TAG/git-cliff-$VERSION_NO_V-$TARGET.tar.gz"
          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT

          echo "Downloading git-cliff $TAG for $TARGET"
          curl -fsSL "$URL" -o "$TMPDIR/git-cliff.tar.gz"
          tar -xzf "$TMPDIR/git-cliff.tar.gz" -C "$TMPDIR"

          BIN="$(find "$TMPDIR" -type f -name git-cliff | head -1)"
          if [ -z "$BIN" ]; then
            echo "::error::git-cliff binary not found in downloaded archive"
            exit 1
          fi

          install -m 0755 "$BIN" "$HOME/.local/bin/git-cliff"
        else
          echo "Using cached git-cliff binary"
        fi

        if INSTALLED_VERSION=$("$HOME/.local/bin/git-cliff" --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1); then
          echo "version=$INSTALLED_VERSION" >> "$GITHUB_OUTPUT"
          echo "git-cliff ready: v$INSTALLED_VERSION"
        else
          echo "::error::git-cliff installation verification failed"
          exit 1
        fi

    - name: Verify installation
      shell: bash
      run: |-
        set -e
        if ! "$HOME/.local/bin/git-cliff" --version &>/dev/null; then
          echo "::error::git-cliff verification failed"
          exit 1
        fi
        echo "git-cliff version: $("$HOME/.local/bin/git-cliff" --version)"
        echo "Installation completed successfully!"
        echo "Cache hit: ${{ steps.cache-cliff.outputs.cache-hit }}"
